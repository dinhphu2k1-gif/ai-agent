# Local stack for optional PostgreSQL / OpenSearch integration tests.
# Postgres: FILTER_INTEGRATION_DATABASE_URL=postgresql+psycopg://filter:filter@127.0.0.1:5433/filter_db
# OpenSearch API: FILTER_INTEGRATION_OPENSEARCH_URL=http://127.0.0.1:9201 (or unset → pytest probes default)
# OpenSearch Dashboards UI: http://127.0.0.1:5601 (service opensearch-dashboards)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filter
      POSTGRES_PASSWORD: filter
      POSTGRES_DB: filter_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filter -d filter_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_MODEL=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "19200:9200"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    depends_on:
      - opensearch
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
